services:
  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    env_file:
      - ./frontend/.env
    environment:
      - BACKEND_URL=http://backend:3000
    ports:
      - "80:8080"
    depends_on:
      - backend
